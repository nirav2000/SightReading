<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sightreading Split Viewer (Grade 2)</title>
<style>
  :root {
    --bg: #0b0c10;
    --panel: #14161d;
    --panel2: #10121a;
    --text: #e8e8ee;
    --muted: #a6a7b5;
    --border: rgba(255,255,255,.10);
    --accent: #7aa2ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    background: var(--bg);
    color: var(--text);
  }
  header {
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0));
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .2px;
  }
  header .meta {
    color: var(--muted);
    font-size: 12px;
  }
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 49px);
  }
  aside {
    border-right: 1px solid var(--border);
    background: var(--panel2);
    display:flex;
    flex-direction: column;
    min-width: 260px;
  }
  .controls {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display:flex;
    flex-direction: column;
    gap: 10px;
  }
  .controls label {
    display:flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .controls input[type="search"] {
    width: 100%;
    padding: 10px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,.04);
    color: var(--text);
    outline: none;
  }
  .controls .row {
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .controls input[type="range"] {
    width: 100%;
  }
  .controls .small {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .piece-list {
    overflow: auto;
    padding: 8px;
  }
  .piece-btn {
    width: 100%;
    text-align: left;
    padding: 10px 10px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
  }
  .piece-btn:hover {
    background: rgba(255,255,255,.05);
    border-color: rgba(255,255,255,.06);
  }
  .piece-btn.active {
    background: rgba(122,162,255,.14);
    border-color: rgba(122,162,255,.35);
  }
  .piece-btn .left {
    display:flex;
    flex-direction: column;
    gap: 2px;
  }
  .piece-btn .title {
    font-weight: 650;
    font-size: 13px;
  }
  .piece-btn .sub {
    font-size: 11px;
    color: var(--muted);
  }
  main {
    padding: 16px;
  }
  .card {
    border: 1px solid var(--border);
    background: rgba(255,255,255,.03);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .card h2 {
    margin: 0 0 10px 0;
    font-size: 14px;
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .img-wrap {
    overflow: auto;
    border: 1px dashed rgba(255,255,255,.14);
    border-radius: 12px;
    padding: 10px;
    background: rgba(0,0,0,.18);
  }
  img.score {
    display:block;
    max-width: none;
    height: auto;
    transform-origin: top left;
    image-rendering: auto;
  }
  .rebuild {
    display:flex;
    flex-direction: column;
    gap: 10px;
  }
  .bar-row {
    display:flex;
    align-items:flex-start;
    flex-wrap: nowrap;
    gap: 0px;
  }
  .bar-row img {
    display:block;
    max-width:none;
    height:auto;
    transform-origin: top left;
  }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    color: var(--muted);
  }
  .two-col {
    display:grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 1100px) {
    .two-col {
      grid-template-columns: 1fr 1fr;
    }
  }
  .error {
    color: #ffb4b4;
    font-size: 12px;
    margin-top: 10px;
  }
</style>
</head>
<body>
<header>
  <h1>Sightreading Split Viewer</h1>
  <div class="meta" id="meta"></div>
</header>

<div class="app">
  <aside>
    <div class="controls">
      <label>
        Search pieces
        <input id="search" type="search" placeholder="e.g., 1, 12, page 3…" />
      </label>

      <div class="row">
        <span class="small">Zoom</span>
        <input id="zoom" type="range" min="40" max="220" value="110" />
        <span class="small" id="zoomLabel">110%</span>
      </div>

      <div class="row" style="justify-content: space-between;">
        <span class="badge" id="countBadge">0 pieces</span>
        <span class="badge" id="barBadge">0 bars</span>
      </div>
      <div class="hint">
        Put this <b>index.html</b> in the same folder as <b>pieces/</b>, <b>bars/</b>, and <b>setup/</b>.
      </div>
    </div>
    <div class="piece-list" id="pieceList"></div>
  </aside>

  <main>
    <div class="two-col">
      <section class="card">
        <h2 id="pieceTitle">Select a piece</h2>
        <div class="img-wrap" id="fullWrap">
          <img id="fullImg" class="score" alt="Full piece" />
        </div>
        <div class="hint" id="pieceInfo"></div>
        <div class="error" id="fullErr" style="display:none;"></div>
      </section>

      <section class="card">
        <h2>Recreated from split bars</h2>
        <div class="img-wrap">
          <div id="rebuild" class="rebuild"></div>
        </div>
        <div class="hint">This view lays out the “setup” (clef/key/time) then bars in order. Rows are inferred from bar bounding boxes.</div>
        <div class="error" id="rebuildErr" style="display:none;"></div>
      </section>
    </div>
  </main>
</div>

const els = {
  meta: document.getElementById('meta'),
  search: document.getElementById('search'),
  zoom: document.getElementById('zoom'),
  zoomLabel: document.getElementById('zoomLabel'),
  pieceList: document.getElementById('pieceList'),
  pieceTitle: document.getElementById('pieceTitle'),
  pieceInfo: document.getElementById('pieceInfo'),
  countBadge: document.getElementById('countBadge'),
  barBadge: document.getElementById('barBadge'),
  fullImg: document.getElementById('fullImg'),
  fullErr: document.getElementById('fullErr'),
  rebuild: document.getElementById('rebuild'),
  rebuildErr: document.getElementById('rebuildErr'),
};

let currentPieceId = null;
let zoom = Number(els.zoom.value) / 100;

function setZoom(z) {
  zoom = z;
  els.zoomLabel.textContent = Math.round(zoom * 100) + '%';
  els.fullImg.style.transform = `scale(${zoom})`;
  els.rebuild.querySelectorAll('img').forEach(img => {
    img.style.transform = `scale(${zoom})`;
  });
}

function safeText(s) {
  return String(s ?? '');
}

function renderList(filterText = '') {
  const q = filterText.trim().toLowerCase();
  els.pieceList.innerHTML = '';

  const pieces = INDEX.pieces || [];
  const filtered = !q ? pieces : pieces.filter(p => {
    const hay = [
      p.exercise_number,
      p.piece_id,
      p.source_page,
      p.piece_image,
      p.setup?.filename,
      (p.bars?.length ?? 0)
    ].map(x => safeText(x).toLowerCase()).join(' ');
    return hay.includes(q);
  });

  els.countBadge.textContent = `${filtered.length} piece${filtered.length === 1 ? '' : 's'}`;

  filtered.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'piece-btn' + (p.piece_id === currentPieceId ? ' active' : '');
    btn.type = 'button';
    btn.dataset.pieceId = p.piece_id;

    const left = document.createElement('div');
    left.className = 'left';
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = `Piece ${p.exercise_number}`;
    const sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = `Page ${p.source_page} • ${p.bars?.length ?? 0} bars`;
    left.appendChild(title);
    left.appendChild(sub);

    const right = document.createElement('span');
    right.className = 'badge';
    right.textContent = p.piece_id;

    btn.appendChild(left);
    btn.appendChild(right);

    btn.addEventListener('click', () => selectPiece(p.piece_id));
    els.pieceList.appendChild(btn);
  });
}

function clearErrors() {
  els.fullErr.style.display = 'none';
  els.rebuildErr.style.display = 'none';
  els.fullErr.textContent = '';
  els.rebuildErr.textContent = '';
}

function showImgError(targetEl, errEl, src, label) {
  targetEl.src = '';
  errEl.style.display = 'block';
  errEl.textContent = `${label} failed to load: ${src}. Make sure pieces/, setup/, and bars/ are next to index.html (same folder), and that you opened index.html from the extracted ZIP.`;
}

function groupBarsIntoRows(bars) {
  // bbox_px: [x1,y1,x2,y2] from the original piece crop
  const rows = [];
  const threshold = 40; // px change in y1 indicates a new staff/system row
  let current = null;
  let currentY = null;

  for (const b of bars) {
    const bbox = b.bbox_px || null;
    const y1 = bbox ? Number(bbox[1]) : (currentY ?? 0);
    if (!current) {
      current = [];
      currentY = y1;
      rows.push(current);
      current.push(b);
      continue;
    }
    if (Math.abs(y1 - currentY) > threshold) {
      current = [];
      currentY = y1;
      rows.push(current);
    }
    current.push(b);
  }
  return rows;
}

function rebuildFromBars(piece) {
  els.rebuild.innerHTML = '';
  if (!piece) return;

  const bars = piece.bars || [];
  const rows = groupBarsIntoRows(bars);

  const setupSrc = piece.setup?.filename;
  if (rows.length === 0) rows.push([]);

  if (setupSrc) {
    rows[0].unshift({ type: 'clef_time_key', filename: setupSrc });
  }

  rows.forEach((rowBars, rowIndex) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.dataset.rowIndex = rowIndex;

    rowBars.forEach(b => {
      const img = document.createElement('img');
      img.alt = b.type === 'clef_time_key' ? 'Clef/Key/Time setup' : `Bar ${b.index ?? ''}`;
      img.src = b.filename;
      img.style.transform = `scale(${zoom})`;
      img.addEventListener('error', () => showImgError(img, els.rebuildErr, b.filename, (b.type === 'clef_time_key' ? 'Setup image' : 'Bar image')));
      row.appendChild(img);
    });

    els.rebuild.appendChild(row);
  });
}

function selectPiece(pieceId) {
  clearErrors();
  const piece = (INDEX.pieces || []).find(p => p.piece_id === pieceId);
  if (!piece) return;

  currentPieceId = pieceId;

  document.querySelectorAll('.piece-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.pieceId === pieceId);
  });

  els.pieceTitle.textContent = `Piece ${piece.exercise_number}`;
  els.pieceInfo.textContent = `piece_id: ${piece.piece_id} • source page: ${piece.source_page} • bars: ${piece.bars?.length ?? 0}`;
  els.barBadge.textContent = `${piece.bars?.length ?? 0} bar${(piece.bars?.length ?? 0) === 1 ? '' : 's'}`;

  const src = piece.piece_image;
  els.fullImg.src = src;
  els.fullImg.alt = `Full piece ${piece.exercise_number}`;
  els.fullImg.style.transform = `scale(${zoom})`;
  els.fullImg.onerror = () => showImgError(els.fullImg, els.fullErr, src, 'Full piece image');

  rebuildFromBars(piece);
}

function init() {
  const pieces = INDEX.pieces || [];
  els.meta.textContent = `Grade ${INDEX.grade ?? ''} • ${pieces.length} pieces`;

  renderList('');

  if (pieces.length) {
    selectPiece(pieces[0].piece_id);
  }

  els.search.addEventListener('input', (e) => {
    renderList(e.target.value);
  });

  els.zoom.addEventListener('input', (e) => {
    setZoom(Number(e.target.value) / 100);
  });

  setZoom(Number(els.zoom.value) / 100);
}

init();
</script>
